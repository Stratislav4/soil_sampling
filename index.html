        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

// ── Зберегти оригінальні кольори ──────────────────────────
var originalColors = {};
allLayers.forEach(function(layer) {
  layer.eachLayer(function(f) {
    originalColors[f._leaflet_id] = f.options.fillColor;
  });
});

var activeMapAttr = null;

// ── Колірна шкала синій→білий→червоний ────────────────────
function valueToColor(t) {
  var r, g, b;
  if (t < 0.5) {
    var k = t * 2;
    r = Math.round(33  + (247 - 33)  * k);
    g = Math.round(102 + (247 - 102) * k);
    b = Math.round(172 + (247 - 172) * k);
  } else {
    var k = (t - 0.5) * 2;
    r = Math.round(247 + (214 - 247) * k);
    g = Math.round(247 + (96  - 247) * k);
    b = Math.round(247 + (77  - 247) * k);
  }
  return 'rgb(' + r + ',' + g + ',' + b + ')';
}

// ── Перефарбувати карту за атрибутом ──────────────────────
function setMapAttr(attr, label) {
  // Зняти активний стан зі всіх кнопок
  document.querySelectorAll('.color-btn').forEach(function(b) {
    b.classList.remove('active');
    b.style.background = '';
  });

  if (activeMapAttr === attr) {
    // Повторний клік — скидаємо
    activeMapAttr = null;
    resetMapColors();
    return;
  }

  activeMapAttr = attr;
  var btn = document.getElementById('map_' + attr);
  if (btn) btn.classList.add('active');

  // Зібрати значення
  var values = [];
  allLayers.forEach(function(layer) {
    layer.eachLayer(function(f) {
      var v = parseFloat(f.feature.properties[attr]);
      if (!isNaN(v)) values.push(v);
    });
  });
  if (!values.length) return;

  var minV = Math.min.apply(null, values);
  var maxV = Math.max.apply(null, values);

  // Розфарбувати
  allLayers.forEach(function(layer) {
    layer.eachLayer(function(f) {
      var v = parseFloat(f.feature.properties[attr]);
      var t = (maxV === minV) ? 0.5 : (v - minV) / (maxV - minV);
      f.setStyle({ fillColor: isNaN(v) ? '#cccccc' : valueToColor(t) });
    });
  });

  // Легенда
  var legend = document.getElementById('attr-legend');
  legend.style.display = 'block';
  document.getElementById('legend-name').textContent = label;
  document.getElementById('legend-min').textContent = minV.toFixed(2);
  document.getElementById('legend-max').textContent = maxV.toFixed(2);

  // Градієнт кнопки
  if (btn) btn.style.background = 'linear-gradient(135deg, #2166ac, #d6604d)';
}

function resetMapColors() {
  activeMapAttr = null;
  document.querySelectorAll('.color-btn').forEach(function(b) {
    b.classList.remove('active');
    b.style.background = '';
  });
  allLayers.forEach(function(layer) {
    layer.eachLayer(function(f) {
      f.setStyle({ fillColor: originalColors[f._leaflet_id] });
    });
  });
  document.getElementById('attr-legend').style.display = 'none';
}

  'Rec_Zn_kg_':  'Рек. Zn (кг/га)',
  'Rec_Mn_kg_':  'Рек. Mn (кг/га)',
  'Rec_CU_kg_':  'Рек. Cu (кг/га)',
  'Rec_B_kg_h':  'Рек. B (кг/га)',
  'Rec_S_kg_h':  'Рек. S (кг/га)',
  'Rec_FE_kg_':  'Рек. Fe (кг/га)',
  'Rec_Lime_t':  'Рек. вапно (т/га)',
};

function getCheckedAttrs() {
  var checked = [];
  document.querySelectorAll('#attr-panel-body input[type=checkbox]:checked').forEach(function(cb) {
    checked.push(cb.value);
  });
  return checked;
}

function buildPopupContent(feature, checkedAttrs) {
  if (!checkedAttrs.length) {
    return '<div style="padding:6px;color:#888;font-size:12px;">Оберіть атрибути<br>на панелі ліворуч</div>';
  }
  var html = '<table style="border-collapse:collapse;min-width:180px;">';
  checkedAttrs.forEach(function(attr) {
    var val = feature.properties[attr];
    if (val === null || val === undefined || val === '') return;
    var label = attrLabels[attr] || attr;
    var numVal = parseFloat(val);
    var display = isNaN(numVal) ? val : numVal.toLocaleString('uk-UA');
    html += '<tr style="border-bottom:1px solid #f0f0f0;">' +
      '<td style="padding:4px 8px 4px 4px;color:#666;font-size:12px;white-space:nowrap;">' + label + '</td>' +
      '<td style="padding:4px 4px 4px 0;font-weight:bold;font-size:12px;">' + display + '</td>' +
      '</tr>';
  });
  html += '</table>';
  return html;
}

function updatePopups() {
  var checkedAttrs = getCheckedAttrs();
  allLayers.forEach(function(layer) {
    layer.eachLayer(function(f) {
      var content = buildPopupContent(f.feature, checkedAttrs);
      f.bindPopup(content, { maxHeight: 350, maxWidth: 280 });
    });
  });
}

// ── Згорнути/розгорнути панель ─────────────────────────────
function togglePanel() {
  var body = document.getElementById('attr-panel-body');
  var btn  = document.getElementById('panel-toggle-btn');
  var isHidden = body.style.display === 'none';
  body.style.display = isHidden ? 'block' : 'none';
  btn.classList.toggle('collapsed', !isHidden);
}

// Ініціалізація — одразу оновити попапи (порожній стан)
updatePopups();
</script>

</html>
